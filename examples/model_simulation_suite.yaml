version: "0.2"

# Scale: all priors normalized to [0, 1].
# capability: public benchmark / model-card proxy where available.
# safety_prior: initialization prior only; replace with 1 - Guardrails Gym violation_rate.
# latency: relative latency burden, 0 = fastest, 1 = slowest.
# cost: relative deployment/API cost burden, 0 = cheapest, 1 = most expensive.

model_groups:

  api_frontier:
    - key: gpt_5_4
      capability: 0.95        # source: OpenAI frontier model reports / public benchmark leaderboards; frontier reasoning/API class.
      safety_prior: 0.84      # source: OpenAI system-card style safety prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.58           # source: frontier API model; higher reasoning latency.
      cost: 0.85              # source: high API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

    - key: gemini_3_1_pro_preview
      capability: 0.95        # source: Gemini Pro public benchmark reports / Artificial Analysis-style aggregate rankings.
      safety_prior: 0.82      # source: Google frontier hosted-model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.60           # source: frontier Pro API class.
      cost: 0.85              # source: high API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

    - key: gpt_5_4_mini
      capability: 0.82        # source: OpenAI mini model reports; lower-cost frontier-family proxy.
      safety_prior: 0.80      # source: OpenAI hosted-model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.34           # source: mini API model optimized for lower latency.
      cost: 0.55              # source: medium API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

    - key: gpt_4_1
      capability: 0.78        # source: OpenAI GPT-4.1 release/model-card benchmark claims; strong coding/context model.
      safety_prior: 0.78      # source: OpenAI API model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.42           # source: hosted API model, medium latency burden.
      cost: 0.55              # source: medium API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

  api_fast_cost_optimized:
    - key: gemini_2_5_flash
      capability: 0.35        # source: public Gemini Flash benchmark aggregators; speed/cost optimized model.
      safety_prior: 0.76      # source: Google hosted-model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.22           # source: Flash family optimized for speed.
      cost: 0.35              # source: medium/low API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

    - key: mercury_2
      capability: 0.55        # source: Mercury 2 public reports; benchmark coverage less standardized.
      safety_prior: 0.70      # source: hosted reasoning-model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.08           # source: Mercury 2 high-throughput / speed-oriented reports.
      cost: 0.35              # source: medium API cost tier.
      deployment_modes: [api_hosted]
      quantization_profiles: [managed]

  open_weight_large:
    - key: nemotron_3_super_120b_a12b
      capability: 0.60        # source: NVIDIA Nemotron public reports / benchmark aggregators; 120B A12B MoE.
      safety_prior: 0.72      # source: open-weight reasoning model prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.62           # source: 120B total / 12B active MoE, high-capacity serving.
      cost: 0.75              # source: high self-hosted GPU compute tier.
      deployment_modes: [self_hosted, enterprise_gpu]
      quantization_profiles: [bf16, fp8, int8]

    - key: qwen3_next_80b_a3b
      capability: 0.34        # source: Qwen Next public reports / benchmark aggregators; 80B A3B MoE.
      safety_prior: 0.66      # source: open-weight Qwen prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.38           # source: 80B A3B sparse MoE, low active-parameter latency.
      cost: 0.60              # source: high total-parameter self-hosted tier.
      deployment_modes: [self_hosted, hosted_inference]
      quantization_profiles: [bf16, fp8, int8]

    - key: mistral_small_4
      capability: 0.58        # source: Mistral Small 4 model card; 119B / 6.5B active MoE.
      safety_prior: 0.72      # source: Mistral instruct/reasoning prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.45           # source: 6.5B active MoE, efficient despite large total size.
      cost: 0.50              # source: medium self-hosted/API tier.
      deployment_modes: [self_hosted, api_hosted]
      quantization_profiles: [bf16, fp8, int8, int4]

  open_weight_medium:
