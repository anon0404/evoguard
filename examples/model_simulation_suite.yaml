    - key: nemotron_cascade_2_30b_a3b
      capability: 0.25        # source: inferred from Nemotron 30B A3B family; verify with direct benchmark run.
      safety_prior: 0.68      # source: inferred open-weight prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.42           # source: Cascade class assumed heavier than Nano; verify empirically.
      cost: 0.50              # source: medium self-hosted compute tier.
      deployment_modes: [self_hosted, enterprise_gpu]
      quantization_profiles: [bf16, fp8, int8, int4]

  edge_small:
    - key: qwen3_4b
      capability: 0.30        # source: Qwen3 4B public model-card / small-model benchmark proxy.
      safety_prior: 0.64      # source: open-weight small instruct prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.20           # source: 4B edge/self-hosted model.
      cost: 0.18              # source: low edge/self-hosted compute tier.
