      safety_prior: 0.74      # source: Google Gemma instruct/safety-tuned prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.38           # source: 26B A4B sparse MoE.
      cost: 0.45              # source: medium self-hosted compute tier.
