      capability: 0.70        # source: Qwen3.5 27B public benchmark aggregators.
      safety_prior: 0.68      # source: Qwen instruct/reasoning prior; replace with empirical Guardrails Gym violation rate.
      latency: 0.45           # source: 27B dense/self-hosted model.
      cost: 0.50              # source: medium self-hosted compute tier.
